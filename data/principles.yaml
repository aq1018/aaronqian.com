- title: Fearless Honesty
  position: 1
  enabled: true
  body: >
    It’s unethical to withhold the truth, even with good intentions. Problems
    fester in the dark and shrink in the light. If there’s a problem, we face
    it and fix it. Together.

- title: Courage over Conformity
  position: 2
  enabled: true
  body: >
    Courage is telling the truth, choosing the unproven path, and owning your
    mistakes. Courage breeds growth; conformity breeds stagnation. Courage often
    walks alone — bring a compass: principles, evidence, and a willingness to
    be wrong.

- title: Life Is More Than Money
  position: 3
  enabled: true
  body: >
    Life is too beautiful, too short, and too precious. Guard its purity; don’t
    let it be devoured by vainglory. Be remembered for whom you served, not
    what you amassed.
