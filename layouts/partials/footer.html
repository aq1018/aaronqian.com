<footer class="site-footer">
  <div class="inner">
    <p>© {{ now.Year }} Aaron Qian</p>
    <ul>
      {{ range where (sort hugo.Data.socials "position") "enabled" true }}
        <li>
          <a
            href="{{ .url }}"
            {{ with .rel }}rel="{{ . }}"{{ end }}
            title="{{ .label }}"
          >
            {{ partial "icon.html" .icon }}
            <span class="sr-only">{{ .label }}</span>
          </a>
        </li>
      {{ end }}
    </ul>
  </div>
</footer>
