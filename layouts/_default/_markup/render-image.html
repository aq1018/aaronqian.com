{{- /*
  Render markdown images as <figure> with caption.
  For images that are page resources, use Hugo image processing for responsive srcsets.
  For absolute paths or external URLs, fall back to a plain <img>.
*/ -}}
{{- $src := .Destination -}}
{{- $alt := .PlainText -}}
{{- $title := .Title -}}
{{- $resource := .Page.Resources.GetMatch $src -}}
{{- if and $resource (in (slice "image/png" "image/jpeg" "image/webp") $resource.MediaType.Type) }}
  {{- $small := $resource.Resize "640x q85 webp" -}}
  {{- $medium := $resource.Resize "960x q85 webp" -}}
  {{- $large := $resource.Resize "1440x q85 webp" -}}
  <figure>
    <picture>
      <source srcset="{{ $small.RelPermalink }} 640w, {{ $medium.RelPermalink }} 960w, {{ $large.RelPermalink }} 1440w" sizes="(max-width: 768px) 100vw, 768px" type="image/webp" />
      <img
        src="{{ $medium.RelPermalink }}"
        alt="{{ $alt }}"
        loading="lazy"
        decoding="async"
        width="{{ $medium.Width }}"
        height="{{ $medium.Height }}"
      />
    </picture>
    {{ with $title }}<figcaption>{{ . }}</figcaption>{{ end }}
  </figure>
{{- else }}
  <figure>
    <img src="{{ $src }}" alt="{{ $alt }}" loading="lazy" decoding="async" />
    {{ with $title }}<figcaption>{{ . }}</figcaption>{{ end }}
  </figure>
{{- end }}
