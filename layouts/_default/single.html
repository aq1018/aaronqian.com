{{ define "main" }}
  <article class="prose prose-invert max-w-none">
    <header class="mb-8">
      <h1 class="text-4xl font-bold tracking-tight">{{ .Title }}</h1>
      {{ with .Description }}<p class="mt-2 text-lg text-muted">{{ . }}</p>{{ end }}
      {{ if not .Date.IsZero }}
        <p class="mt-2 text-sm text-muted"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time></p>
      {{ end }}
    </header>
    <div class="content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
