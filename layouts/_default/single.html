{{ define "main" }}
  <article class="post">
    <header class="page-header">
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="description">{{ . }}</p>{{ end }}
      {{ if not .Date.IsZero }}
        <p class="date"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time></p>
      {{ end }}
    </header>
    <div class="content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
