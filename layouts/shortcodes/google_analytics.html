{{- /*
  Google Analytics 4 tracking shortcode. Only emits in production.
  Args: id (optional, defaults to site.Params.googleAnalyticsId)
*/ -}}
{{- if hugo.IsProduction -}}
  {{- $id := .Get "id" | default .Site.Params.googleAnalyticsId -}}
  {{- with $id -}}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ . }}"></script>
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() {
        dataLayer.push(arguments)
      }
      gtag('js', new Date())
      gtag('config', '{{ . }}')
    </script>
  {{- end -}}
{{- end -}}
